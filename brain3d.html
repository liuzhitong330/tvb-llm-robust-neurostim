const canvas = document.getElementById('c');
const tooltip = document.getElementById('tooltip');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0xf5f5f5, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 220);

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const dl = new THREE.DirectionalLight(0xffffff, 0.6);
dl.position.set(100, 100, 100);
scene.add(dl);

const group = new THREE.Group();
scene.add(group);

function toColor(v) {
  const t = Math.max(0, Math.min(1, v));
  return new THREE.Color(
    (33 + t * 222) / 255,
    (150 - t * 63) / 255,
    (243 - t * 209) / 255
  );
}

let mode = 'baseline';
const spheres = [];

DATA.regions.forEach(r => {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(2.5, 16, 16),
    new THREE.MeshPhongMaterial({color: toColor(r.baseline)})
  );
  mesh.position.set(r.x, r.z, r.y);
  mesh.userData = r;
  group.add(mesh);
  spheres.push(mesh);
});

DATA.edges.forEach(e => {
  const a = DATA.regions[e.i], b = DATA.regions[e.j];
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(a.x, a.z, a.y),
    new THREE.Vector3(b.x, b.z, b.y)
  ]);
  group.add(new THREE.Line(geo,
    new THREE.LineBasicMaterial({color: 0x8888cc, transparent: true, opacity: 0.15 + e.w * 0.2})
  ));
});

function setMode(m) {
  mode = m;
  spheres.forEach(s => {
    s.material.color = toColor(m === 'baseline' ? s.userData.baseline : s.userData.optimized);
  });
}

window.addEventListener('message', function(e) {
  if (e.data && e.data.mode) setMode(e.data.mode);
});

let drag = false, px = 0, py = 0, autoSpin = true;
canvas.addEventListener('mousedown', e => { drag = true; autoSpin = false; px = e.clientX; py = e.clientY; });
window.addEventListener('mouseup', () => { drag = false; });
canvas.addEventListener('mousemove', e => {
  if (drag) {
    group.rotation.y += (e.clientX - px) * 0.01;
    group.rotation.x += (e.clientY - py) * 0.01;
    px = e.clientX; py = e.clientY;
  }
  const mouse = new THREE.Vector2(
    (e.clientX / window.innerWidth) * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1
  );
  const ray = new THREE.Raycaster();
  ray.setFromCamera(mouse, camera);
  const hits = ray.intersectObjects(spheres);
  if (hits.length) {
    const r = hits[0].object.userData;
    const v = mode === 'baseline' ? r.baseline : r.optimized;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    tooltip.textContent = r.label + ' — ' + v.toFixed(3);
  } else {
    tooltip.style.display = 'none';
  }
});
canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; autoSpin = true; });

(function animate() {
  requestAnimationFrame(animate);
  if (autoSpin) group.rotation.y += 0.003;
  renderer.render(scene, camera);
})();
</script>
